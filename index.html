<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 研習任務檢核面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            /* 更具質感的漸層背景 */
            background: linear-gradient(135deg, #f0f4ff 0%, #ffffff 50%, #f3f8ff 100%);
            background-attachment: fixed;
        }
        .task-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .task-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(37, 99, 235, 0.15);
            border-color: #bfdbfe;
        }
        .task-checked {
            background-color: #f0fdf4 !important;
            border-color: #6ee7b7 !important;
            box-shadow: none !important;
            transform: translateY(0) !important;
        }
        .task-checked-text {
            color: #047857 !important;
            text-decoration: line-through;
            opacity: 0.6;
            transition: all 0.3s ease;
        }
        
        /* 自訂核取方塊的動畫 */
        .task-checkbox:checked {
            animation: pop 0.3s ease-in-out;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .progress-transition {
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-gray-800">

    <div class="max-w-4xl mx-auto space-y-8 relative">
        
        <!-- Header & Timer Section -->
        <header class="bg-white/80 backdrop-blur-lg rounded-2xl shadow-sm border border-blue-100 p-6 md:p-8 flex flex-col md:flex-row items-center justify-between gap-6 relative overflow-hidden">
            <!-- 裝飾用光暈 -->
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-100 rounded-full blur-3xl opacity-50 pointer-events-none"></div>
            
            <div class="flex-1 w-full relative z-10">
                <h1 class="text-3xl font-extrabold text-gray-900 flex items-center gap-3 tracking-tight">
                    <div class="bg-blue-600 p-2 rounded-xl text-white shadow-md">
                        <i data-lucide="sparkles" class="w-6 h-6"></i>
                    </div>
                    AI 實戰研習任務版
                </h1>
                <p class="text-gray-500 mt-2 font-medium">請選擇您的組別，並在時限內依序完成以下任務。</p>
            </div>
            
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto relative z-10">
                <div class="relative w-full sm:w-48">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <i data-lucide="users" class="w-4 h-4 text-gray-400"></i>
                    </div>
                    <select id="group-select" class="bg-white border-2 border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-3 font-bold shadow-sm transition-colors hover:border-blue-300 appearance-none cursor-pointer">
                        <option value="" disabled selected>請選擇您的組別</option>
                        <option value="語文組">語文組</option>
                        <option value="數理組">數理組 (含數學/自然)</option>
                        <option value="社會組">社會組</option>
                        <option value="行政組">行政組</option>
                        <option value="輔導組">輔導組</option>
                        <option value="日常組">日常組 (生活旅遊應用)</option>
                    </select>
                </div>

                <div class="bg-white border-2 border-blue-100 shadow-sm rounded-xl px-5 py-2.5 flex items-center gap-4 w-full sm:w-auto">
                    <i data-lucide="timer" class="w-5 h-5 text-blue-600 animate-pulse"></i>
                    <span id="timer-display" class="text-2xl font-black text-blue-700 font-mono tracking-widest">25:00</span>
                    <button id="timer-btn" class="text-sm bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700 hover:shadow-md transition-all font-bold">開始</button>
                </div>
            </div>
        </header>

        <!-- 進度條 -->
        <div class="bg-white/60 p-4 rounded-2xl border border-gray-200 shadow-sm backdrop-blur-sm flex items-center gap-4">
            <span class="text-sm font-bold text-gray-500 whitespace-nowrap">任務進度</span>
            <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-indigo-600 h-3 rounded-full progress-transition" style="width: 0%"></div>
            </div>
            <span id="progress-text" class="text-sm font-bold text-blue-600 whitespace-nowrap">0/6</span>
        </div>

        <!-- Tasks Section -->
        <main class="space-y-4 relative z-10" id="task-list">
            <!-- 任務 1 -->
            <label class="task-card flex items-start gap-5 p-6 bg-white border-2 border-transparent rounded-2xl shadow-sm cursor-pointer relative overflow-hidden group">
                <div class="mt-1">
                    <input type="checkbox" class="w-6 h-6 text-blue-600 bg-gray-50 border-2 border-gray-300 rounded focus:ring-blue-500 task-checkbox transition-all cursor-pointer">
                </div>
                <div class="flex-1">
                    <div class="flex flex-wrap items-center gap-3">
                        <h3 class="text-xl font-bold text-gray-800 task-title">任務 1：指令金律與語氣調整</h3>
                        <span class="text-xs bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold shadow-sm">核心教學 1, 3</span>
                    </div>
                    <p class="text-gray-600 mt-2 task-desc font-medium">請依據您的組別屬性，輸入包含「角色、對象、目標」的指令，並使用 Canvas 功能調整一段文字的語氣。</p>
                    <div id="task1-hint" class="mt-3 text-sm text-indigo-800 bg-indigo-50 border border-indigo-200 p-4 rounded-xl hidden shadow-inner flex gap-2">
                        <i data-lucide="lightbulb" class="w-5 h-5 flex-shrink-0 text-indigo-500"></i>
                        <span class="font-medium" id="task1-hint-text"></span>
                    </div>
                </div>
            </label>

            <!-- 任務 2 -->
            <label class="task-card flex items-start gap-5 p-6 bg-white border-2 border-transparent rounded-2xl shadow-sm cursor-pointer group">
                <div class="mt-1">
                    <input type="checkbox" class="w-6 h-6 text-blue-600 bg-gray-50 border-2 border-gray-300 rounded focus:ring-blue-500 task-checkbox transition-all cursor-pointer">
                </div>
                <div class="flex-1">
                    <div class="flex flex-wrap items-center gap-3">
                        <h3 class="text-xl font-bold text-gray-800 task-title">任務 2：雲端聯動與匯出</h3>
                        <span class="text-xs bg-purple-100 text-purple-800 px-3 py-1 rounded-full font-bold shadow-sm">串聯教學 2</span>
                    </div>
                    <p class="text-gray-600 mt-2 task-desc font-medium">將任務 1 所產出的內容，點選畫面下方的「分享與匯出」，一鍵轉存為 Google 文件。</p>
                </div>
            </label>

            <!-- 任務 3 -->
            <label class="task-card flex items-start gap-5 p-6 bg-white border-2 border-transparent rounded-2xl shadow-sm cursor-pointer group">
                <div class="mt-1">
                    <input type="checkbox" class="w-6 h-6 text-blue-600 bg-gray-50 border-2 border-gray-300 rounded focus:ring-blue-500 task-checkbox transition-all cursor-pointer">
                </div>
                <div class="flex-1">
                    <div class="flex flex-wrap items-center gap-3">
                        <h3 class="text-xl font-bold text-gray-800 task-title">任務 3：建立 NotebookLM 知識庫</h3>
                        <span class="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold shadow-sm">進階教學 1, 2</span>
                    </div>
                    <p class="text-gray-600 mt-2 task-desc font-medium">開啟 NotebookLM，建立新筆記本並「匯入剛才產出的 Google 文件」，隨後要求 AI 生成一份研習指南或摘要。</p>
                </div>
            </label>

            <!-- 任務 4 -->
            <label class="task-card flex items-start gap-5 p-6 bg-white border-2 border-transparent rounded-2xl shadow-sm cursor-pointer group">
                <div class="mt-1">
                    <input type="checkbox" class="w-6 h-6 text-blue-600 bg-gray-50 border-2 border-gray-300 rounded focus:ring-blue-500 task-checkbox transition-all cursor-pointer">
                </div>
                <div class="flex-1">
                    <div class="flex flex-wrap items-center gap-3">
                        <h3 class="text-xl font-bold text-gray-800 task-title">任務 4：AI 工作室多媒體產出</h3>
                        <span class="text-xs bg-pink-100 text-pink-800 px-3 py-1 rounded-full font-bold shadow-sm">進階教學 2</span>
                    </div>
                    <p class="text-gray-600 mt-2 task-desc font-medium">在 NotebookLM 的工作室指南面板中，將您的文件一鍵轉換為令人驚豔的「音訊摘要 (Audio Overview) Podcast」或「練習卡 (Flashcards)」。</p>
                </div>
            </label>

            <!-- 任務 5 -->
            <label class="task-card flex items-start gap-5 p-6 bg-white border-2 border-transparent rounded-2xl shadow-sm cursor-pointer group">
                <div class="mt-1">
                    <input type="checkbox" class="w-6 h-6 text-blue-600 bg-gray-50 border-2 border-gray-300 rounded focus:ring-blue-500 task-checkbox transition-all cursor-pointer">
                </div>
                <div class="flex-1">
                    <div class="flex flex-wrap items-center gap-3">
                        <h3 class="text-xl font-bold text-gray-800 task-title">任務 5：客製化專屬 Gem 分身</h3>
                        <span class="text-xs bg-orange-100 text-orange-800 px-3 py-1 rounded-full font-bold shadow-sm">客製教學 4</span>
                    </div>
                    <p class="text-gray-600 mt-2 task-desc font-medium">在 Gemini 畫面左側選單建立一個該組「專屬的 Gem 助理」，並設定其系統指令與回應風格。</p>
                    <div id="task5-hint" class="mt-3 text-sm text-orange-800 bg-orange-50 border border-orange-200 p-4 rounded-xl hidden shadow-inner flex gap-2">
                        <i data-lucide="bot" class="w-5 h-5 flex-shrink-0 text-orange-500"></i>
                        <span class="font-medium" id="task5-hint-text"></span>
                    </div>
                </div>
            </label>

            <!-- 任務 6 -->
            <label class="task-card flex items-start gap-5 p-6 bg-white border-2 border-transparent rounded-2xl shadow-sm cursor-pointer group">
                <div class="mt-1">
                    <input type="checkbox" class="w-6 h-6 text-blue-600 bg-gray-50 border-2 border-gray-300 rounded focus:ring-blue-500 task-checkbox transition-all cursor-pointer">
                </div>
                <div class="flex-1">
                    <div class="flex flex-wrap items-center gap-3">
                        <h3 class="text-xl font-bold text-gray-800 task-title">任務 6：跨平台整合驗證</h3>
                        <span class="text-xs bg-slate-100 text-slate-800 px-3 py-1 rounded-full font-bold shadow-sm border border-slate-300">整合應用總結</span>
                    </div>
                    <p class="text-gray-600 mt-2 task-desc font-medium">回到 Gemini 視窗，輸入 <code class="bg-gray-100 px-2 py-1 rounded text-red-500 font-mono text-sm border border-gray-200 shadow-sm">@Google Drive</code> 搜尋剛才匯出的文件，並請 AI 根據該文件寫一段 Line 群組公告。</p>
                </div>
            </label>
        </main>

        <!-- 任務全部完成的慶祝橫幅 (預設隱藏) -->
        <div id="success-banner" class="hidden flex-col items-center justify-center p-8 bg-gradient-to-r from-green-500 to-emerald-600 rounded-2xl shadow-xl text-white transform transition-all duration-500 scale-95 opacity-0">
            <div class="bg-white/20 p-4 rounded-full mb-4">
                <i data-lucide="party-popper" class="w-12 h-12 text-yellow-300"></i>
            </div>
            <h2 class="text-3xl font-black mb-2 tracking-wide">太棒了！研習任務全數達標！</h2>
            <p class="text-green-100 font-medium text-lg text-center">您已完整體驗 AI 的強大工作流，請保留此畫面並給自己一個掌聲。</p>
        </div>

    </div>

    <script>
        // 初始化 Lucide 圖示
        lucide.createIcons();

        // 任務 1 動態建議資料 (依據需求更新)
        const groupHints = {
            "語文組": "專屬任務建議：請輸入指令批改下方作文，並給予建議。",
            "數理組": "專屬任務建議：請輸入指令設計酸鹼中和滴定實驗紀錄表，或是針對「三角函數」設計引導式提問教學。",
            "社會組": "專屬任務建議：請輸入指令設計高中地理「地形系統」的戶外考察學習單與地圖判讀指引。",
            "行政組": "專屬任務建議：請輸入指令將長篇教育局來文摘要成 3 個重點，並擬定一段發給全校老師的 Line 群組公告。",
            "輔導組": "專屬任務建議：請輸入指令整理拒學傾向個案紀錄並擬定親師溝通語句。",
            "日常組": "專屬任務建議：請輸入指令為自己規劃一趟 3 天 2 夜的日本京阪神自由行，包含每日行程與當地交通預算估算。"
        };

        // 任務 5 Gem分身動態建議資料 (新增功能)
        const gemHints = {
            "語文組": "專屬 Gem 建議：建立一位「資深國文/英文作文閱卷老師」，設定其語氣嚴謹且能精準點出學生的寫作盲點與修辭建議。",
            "數理組": "專屬 Gem 建議：建立一位「蘇格拉底數理導師」，設定其絕對不直接給出最終答案，而是利用提問一步步引導學生思考。",
            "社會組": "專屬 Gem 建議：建立一位「資深戶外考察地理嚮導」，設定其熟悉各地地形地貌與人文歷史發展，能隨時補充課外知識。",
            "行政組": "專屬 Gem 建議：建立一位「公文翻譯翻譯機」，設定其能將文言文或生硬的公部門用語，自動轉換為活潑親切的白話文公告。",
            "輔導組": "專屬 Gem 建議：建立一位「同理心溝通教練」，設定其語氣溫暖包容，能提供具體的輔導策略與親師對話鷹架。",
            "日常組": "專屬 Gem 建議：建立一位「精打細算旅遊達人」，設定其專精於各國交通票券規則與在地隱藏版美食推薦。"
        };

        // DOM 元素選取
        const groupSelect = document.getElementById('group-select');
        const checkboxes = document.querySelectorAll('.task-checkbox');
        
        const task1HintBox = document.getElementById('task1-hint');
        const task1HintText = document.getElementById('task1-hint-text');
        
        const task5HintBox = document.getElementById('task5-hint');
        const task5HintText = document.getElementById('task5-hint-text');

        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const successBanner = document.getElementById('success-banner');
        
        // 計時器邏輯
        let timeLeft = 25 * 60; 
        let timerInterval = null;
        let isRunning = false;
        const timerDisplay = document.getElementById('timer-display');
        const timerBtn = document.getElementById('timer-btn');

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        timerBtn.addEventListener('click', () => {
            if (isRunning) {
                clearInterval(timerInterval);
                timerBtn.textContent = '繼續';
                timerBtn.classList.replace('bg-red-600', 'bg-blue-600');
                timerBtn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
            } else {
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerInterval);
                        timerDisplay.classList.add('text-red-600');
                        timerDisplay.classList.remove('text-blue-700');
                        timerBtn.textContent = '已結束';
                        timerBtn.disabled = true;
                        timerBtn.classList.replace('bg-blue-600', 'bg-gray-500');
                        timerBtn.classList.replace('hover:bg-blue-700', 'hover:bg-gray-600');
                    }
                }, 1000);
                timerBtn.textContent = '暫停';
                timerBtn.classList.replace('bg-blue-600', 'bg-red-600');
                timerBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');
                // 如果是從綠色(繼續)按過來
                if(timerBtn.classList.contains('bg-green-600')) {
                    timerBtn.classList.replace('bg-green-600', 'bg-red-600');
                    timerBtn.classList.replace('hover:bg-green-700', 'hover:bg-red-700');
                }
            }
            isRunning = !isRunning;
        });

        // 處理組別選擇連動
        groupSelect.addEventListener('change', (e) => {
            const group = e.target.value;
            
            // 更新任務 1 提示
            if (groupHints[group]) {
                task1HintText.textContent = groupHints[group];
                task1HintBox.classList.remove('hidden');
            } else {
                task1HintBox.classList.add('hidden');
            }

            // 更新任務 5 提示
            if (gemHints[group]) {
                task5HintText.textContent = gemHints[group];
                task5HintBox.classList.remove('hidden');
            } else {
                task5HintBox.classList.add('hidden');
            }
        });

        // 處理勾選進度邏輯與樣式
        checkboxes.forEach(cb => {
            cb.addEventListener('change', function() {
                // 卡片視覺回饋
                const card = this.closest('.task-card');
                const title = card.querySelector('.task-title');
                const desc = card.querySelector('.task-desc');
                
                if (this.checked) {
                    card.classList.add('task-checked', 'border-transparent');
                    title.classList.add('task-checked-text');
                    desc.classList.add('task-checked-text');
                } else {
                    card.classList.remove('task-checked');
                    title.classList.remove('task-checked-text');
                    desc.classList.remove('task-checked-text');
                }

                // 計算並更新進度條
                const totalCount = checkboxes.length;
                const checkedCount = document.querySelectorAll('.task-checkbox:checked').length;
                const percentage = (checkedCount / totalCount) * 100;
                
                progressBar.style.width = `${percentage}%`;
                progressText.textContent = `${checkedCount}/${totalCount}`;

                // 若全數完成，顯示慶祝橫幅
                if (checkedCount === totalCount) {
                    successBanner.classList.remove('hidden');
                    successBanner.classList.add('flex');
                    // 觸發進場動畫
                    setTimeout(() => {
                        successBanner.classList.remove('scale-95', 'opacity-0');
                        successBanner.classList.add('scale-100', 'opacity-100');
                    }, 50);
                    // 畫面自動平滑捲動至橫幅
                    setTimeout(() => {
                        successBanner.scrollIntoView({ behavior: 'smooth', block: 'end' });
                    }, 300);
                } else {
                    successBanner.classList.add('scale-95', 'opacity-0');
                    successBanner.classList.remove('scale-100', 'opacity-100');
                    setTimeout(() => {
                        successBanner.classList.add('hidden');
                        successBanner.classList.remove('flex');
                    }, 500); // 等待動畫結束後隱藏
                }
            });
        });

    </script>
</body>
</html>
